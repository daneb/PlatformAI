services:

  # ── Stub backend ── mock OpenAI-compatible API; replays fixtures in tests
  stub-backend:
    build: ./stub_backend
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ── LiteLLM broker ── OpenAI-compatible model gateway; routes to stub-backend
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    depends_on:
      stub-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # ── Summarize spoke ── P0 stub capability
  capability-summarize:
    build:
      context: .
      dockerfile: capabilities/summarize/Dockerfile
    ports:
      - "8001:8001"
    environment:
      LITELLM_URL: http://litellm:4000
      INFERENCE_MODEL: stub-model
      LITELLM_KEY: sk-platform-dev
    depends_on:
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

  # ── Gateway ── control plane; all traffic enters here
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      capability-summarize:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
