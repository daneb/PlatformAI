services:

  # ── Postgres + pgvector ── vector store for RAG
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d platform"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── MinIO ── S3-compatible object store for OCR/IDP document refs
  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: platform
      MINIO_ROOT_PASSWORD: platform123
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── OPA ── policy engine; evaluates policy/egress.rego for egress decisions
  opa:
    image: openpolicyagent/opa:latest-debug
    command: ["run", "--server", "--addr", ":8181", "/policies"]
    volumes:
      - ./policy:/policies:ro
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8181/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── Stub backend ── mock OpenAI-compatible API; replays fixtures in tests
  stub-backend:
    build: ./stub_backend
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ── LiteLLM broker ── OpenAI-compatible model gateway; routes to stub-backend
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    depends_on:
      stub-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # ── Summarize spoke ── P0 stub capability
  capability-summarize:
    build:
      context: .
      dockerfile: capabilities/summarize/Dockerfile
    ports:
      - "8001:8001"
    environment:
      LITELLM_URL: http://litellm:4000
      INFERENCE_MODEL: stub-model
      LITELLM_KEY: sk-platform-dev
    depends_on:
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

  # ── RAG spoke ── P1 retrieval-augmented generation
  capability-rag:
    build:
      context: .
      dockerfile: capabilities/rag/Dockerfile
    ports:
      - "8003:8003"
    environment:
      LITELLM_URL: http://litellm:4000
      EMBED_MODEL: embed-model
      GEN_MODEL: deepseek-v4-flash
      LITELLM_KEY: sk-platform-dev
      DATABASE_URL: postgresql://platform:platform@postgres:5432/platform
    depends_on:
      litellm:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 20s

  # ── OCR spoke ── P2 local-first text/layout extraction (Tesseract)
  capability-ocr:
    build:
      context: .
      dockerfile: capabilities/ocr/Dockerfile
    ports:
      - "8004:8004"
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: platform
      MINIO_SECRET_KEY: platform123
      MINIO_BUCKET: documents
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

  # ── IDP spoke ── P2 orchestrator: OCR.extract_layout → classify → extract_fields → validate
  capability-idp:
    build:
      context: .
      dockerfile: capabilities/idp/Dockerfile
    ports:
      - "8005:8005"
    environment:
      LITELLM_URL: http://litellm:4000
      GEN_MODEL: deepseek-v4-flash
      LITELLM_KEY: sk-platform-dev
      OCR_URL: http://capability-ocr:8004
    depends_on:
      litellm:
        condition: service_healthy
      capability-ocr:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

  # ── Vision spoke ── P3 image understanding via LiteLLM vision (deepseek-v4-flash multimodal)
  capability-vision:
    build:
      context: .
      dockerfile: capabilities/vision/Dockerfile
    ports:
      - "8006:8006"
    environment:
      LITELLM_URL: http://litellm:4000
      GEN_MODEL: deepseek-v4-flash
      LITELLM_KEY: sk-platform-dev
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: platform
      MINIO_SECRET_KEY: platform123
    depends_on:
      litellm:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

  # ── Anomaly spoke ── P3 fully local anomaly detection (scikit-learn IsolationForest)
  capability-anomaly:
    build:
      context: .
      dockerfile: capabilities/anomaly/Dockerfile
    ports:
      - "8007:8007"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8007/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

  # ── Gateway ── control plane; all traffic enters here
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      OPA_URL: http://opa:8181
    depends_on:
      capability-summarize:
        condition: service_healthy
      capability-rag:
        condition: service_healthy
      capability-ocr:
        condition: service_healthy
      capability-idp:
        condition: service_healthy
      capability-vision:
        condition: service_healthy
      capability-anomaly:
        condition: service_healthy
      opa:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
