<svg viewBox="0 0 820 560" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui,sans-serif" font-size="13">
  <title>P2 OCR + IDP Capability — Service Architecture</title>
  <desc>Seven docker-compose services: gateway (control plane), capability-idp and capability-ocr (new P2 spokes), LiteLLM broker, stub-backend, MinIO object store; with request/response arrows and startup dependency chain.</desc>

  <rect width="820" height="560" fill="#ffffff"/>
  <text x="410" y="26" text-anchor="middle" font-size="15" font-weight="600" fill="#111111">P2 OCR + IDP Capability — Service Architecture</text>

  <defs>
    <marker id="ab" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#4A90D9"/></marker>
    <marker id="at" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#16A085"/></marker>
    <marker id="ao" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#C0392B"/></marker>
    <marker id="al" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#E8952A"/></marker>
    <marker id="ap" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#8B5CF6"/></marker>
    <marker id="am" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#B8860B"/></marker>
    <marker id="ax" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#888888"/></marker>
    <marker id="as" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#555555"/></marker>
  </defs>

  <!-- ── Client ── -->
  <rect x="14" y="210" width="90" height="60" rx="8" fill="#f5f5f5" stroke="#cccccc" stroke-width="1.5"/>
  <text x="59" y="233" text-anchor="middle" font-weight="600" fill="#111111">Client</text>
  <text x="59" y="250" text-anchor="middle" font-size="11" fill="#666666">curl / pytest</text>
  <text x="59" y="265" text-anchor="middle" font-size="10" fill="#888888">submit · poll</text>

  <!-- ── Gateway ── -->
  <rect x="150" y="118" width="132" height="200" rx="8" fill="#E8F0FB" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="216" y="139" text-anchor="middle" font-weight="600" fill="#1a3a6b">Gateway</text>
  <text x="216" y="156" text-anchor="middle" font-size="11" fill="#1a3a6b">:8000</text>
  <rect x="168" y="174" width="96" height="48" rx="5" fill="#ffffff" stroke="#4A90D9" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="216" y="194" text-anchor="middle" font-size="11" fill="#1a3a6b" font-weight="500">Job Store</text>
  <text x="216" y="209" text-anchor="middle" font-size="10" fill="#4A90D9">in-memory</text>
  <text x="216" y="298" text-anchor="middle" font-size="10" fill="#1a3a6b">Envelope · Routing · Jobs</text>

  <!-- ── capability-idp ── (NEW) -->
  <rect x="340" y="118" width="138" height="100" rx="8" fill="#E8F8F5" stroke="#16A085" stroke-width="2"/>
  <text x="409" y="139" text-anchor="middle" font-weight="600" fill="#0b4f43">IDP</text>
  <text x="409" y="156" text-anchor="middle" font-size="11" fill="#0b4f43">:8005  ★ new</text>
  <text x="409" y="174" text-anchor="middle" font-size="10" fill="#0b4f43">process(object_ref, schema</text>
  <text x="409" y="188" text-anchor="middle" font-size="10" fill="#0b4f43">ruleset) → doc_type + fields</text>
  <text x="409" y="204" text-anchor="middle" font-size="10" fill="#16A085">classify · extract · validate</text>

  <!-- ── capability-ocr ── (NEW) -->
  <rect x="340" y="252" width="138" height="90" rx="8" fill="#FBEAEA" stroke="#C0392B" stroke-width="2"/>
  <text x="409" y="272" text-anchor="middle" font-weight="600" fill="#7a1f1f">OCR</text>
  <text x="409" y="289" text-anchor="middle" font-size="11" fill="#7a1f1f">:8004  ★ new</text>
  <text x="409" y="307" text-anchor="middle" font-size="10" fill="#7a1f1f">extract_text | extract_layout</text>
  <text x="409" y="323" text-anchor="middle" font-size="10" fill="#C0392B">Tesseract · zero egress</text>

  <!-- ── LiteLLM ── -->
  <rect x="536" y="128" width="118" height="110" rx="8" fill="#FEF4E4" stroke="#E8952A" stroke-width="1.5"/>
  <text x="595" y="150" text-anchor="middle" font-weight="600" fill="#7a4400">LiteLLM</text>
  <text x="595" y="167" text-anchor="middle" font-size="11" fill="#7a4400">:4000</text>
  <text x="595" y="190" text-anchor="middle" font-size="10" fill="#7a4400">deepseek-v4-flash</text>
  <text x="595" y="206" text-anchor="middle" font-size="10" fill="#7a4400">deepseek-v4-pro</text>
  <text x="595" y="222" text-anchor="middle" font-size="10" fill="#E8952A">routes classify+extract</text>

  <!-- ── stub-backend ── -->
  <rect x="702" y="128" width="108" height="100" rx="8" fill="#F5F0FB" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="756" y="150" text-anchor="middle" font-weight="600" fill="#3b1a7a">stub-backend</text>
  <text x="756" y="167" text-anchor="middle" font-size="11" fill="#3b1a7a">:8002</text>
  <text x="756" y="188" text-anchor="middle" font-size="10" fill="#3b1a7a">classify → doc_type</text>
  <text x="756" y="204" text-anchor="middle" font-size="10" fill="#3b1a7a">extract → fields JSON</text>
  <text x="756" y="218" text-anchor="middle" font-size="10" fill="#8B5CF6">keyword + regex match</text>

  <!-- ── MinIO ── (NEW) -->
  <rect x="536" y="275" width="118" height="85" rx="8" fill="#FBF3DE" stroke="#B8860B" stroke-width="2"/>
  <text x="595" y="297" text-anchor="middle" font-weight="600" fill="#6b4f00">MinIO</text>
  <text x="595" y="314" text-anchor="middle" font-size="11" fill="#6b4f00">:9000  ★ new</text>
  <text x="595" y="333" text-anchor="middle" font-size="10" fill="#6b4f00">S3-compatible store</text>
  <text x="595" y="349" text-anchor="middle" font-size="10" fill="#B8860B">bucket: documents</text>

  <!-- ── Arrows ── -->
  <!-- Client → Gateway -->
  <line x1="104" y1="240" x2="150" y2="240" stroke="#4A90D9" stroke-width="1.6" marker-end="url(#ab)"/>
  <text x="127" y="234" text-anchor="middle" font-size="10" fill="#4A90D9">POST</text>

  <!-- Gateway → IDP (POST /execute) -->
  <line x1="282" y1="160" x2="340" y2="160" stroke="#16A085" stroke-width="1.6" marker-end="url(#at)"/>
  <text x="311" y="154" text-anchor="middle" font-size="10" fill="#16A085">POST /execute</text>

  <!-- Gateway → OCR (POST /execute for direct capability calls) -->
  <line x1="282" y1="295" x2="340" y2="295" stroke="#C0392B" stroke-width="1.6" marker-end="url(#ao)"/>
  <text x="311" y="289" text-anchor="middle" font-size="10" fill="#C0392B">POST /execute</text>

  <!-- IDP → OCR (direct call, labeled) -->
  <line x1="409" y1="218" x2="409" y2="252" stroke="#16A085" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#at)"/>
  <text x="435" y="237" text-anchor="start" font-size="10" fill="#16A085">direct call</text>
  <text x="435" y="249" text-anchor="start" font-size="10" fill="#888888">no job created</text>

  <!-- IDP → LiteLLM -->
  <line x1="478" y1="158" x2="536" y2="166" stroke="#E8952A" stroke-width="1.6" marker-end="url(#al)"/>
  <text x="507" y="153" text-anchor="middle" font-size="10" fill="#E8952A">classify + extract</text>

  <!-- LiteLLM → stub-backend -->
  <line x1="654" y1="173" x2="702" y2="173" stroke="#8B5CF6" stroke-width="1.6" marker-end="url(#ap)"/>
  <text x="678" y="167" text-anchor="middle" font-size="10" fill="#8B5CF6">routes to</text>

  <!-- OCR → MinIO -->
  <line x1="478" y1="310" x2="536" y2="310" stroke="#B8860B" stroke-width="1.6" marker-end="url(#am)"/>
  <text x="507" y="304" text-anchor="middle" font-size="10" fill="#B8860B">GetObject</text>

  <!-- ── Startup dependency chain ── -->
  <text x="14" y="400" font-size="11" font-weight="600" fill="#555555">Startup dependency chain (docker-compose depends_on: condition: service_healthy)</text>

  <!-- Chain 1 row -->
  <rect x="14"  y="415" width="88" height="30" rx="4" fill="#F5F0FB" stroke="#8B5CF6" stroke-width="1"/>
  <text x="58"  y="433" text-anchor="middle" font-size="10" fill="#3b1a7a">stub-backend</text>
  <line x1="102" y1="430" x2="116" y2="430" stroke="#555555" stroke-width="1.2" marker-end="url(#as)"/>
  <rect x="116" y="415" width="72" height="30" rx="4" fill="#FEF4E4" stroke="#E8952A" stroke-width="1"/>
  <text x="152" y="433" text-anchor="middle" font-size="10" fill="#7a4400">litellm</text>
  <line x1="188" y1="430" x2="202" y2="430" stroke="#555555" stroke-width="1.2" marker-end="url(#as)"/>
  <rect x="202" y="415" width="72" height="30" rx="4" fill="#FBF3DE" stroke="#B8860B" stroke-width="1"/>
  <text x="238" y="433" text-anchor="middle" font-size="10" fill="#6b4f00">minio</text>

  <!-- Chain 2 row -->
  <rect x="330" y="415" width="72" height="30" rx="4" fill="#FBEAEA" stroke="#C0392B" stroke-width="1"/>
  <text x="366" y="433" text-anchor="middle" font-size="10" fill="#7a1f1f">capability-ocr</text>
  <text x="309" y="433" text-anchor="end" font-size="10" fill="#888888">minio + litellm →</text>
  <line x1="402" y1="430" x2="416" y2="430" stroke="#555555" stroke-width="1.2" marker-end="url(#as)"/>
  <rect x="416" y="415" width="72" height="30" rx="4" fill="#E8F8F5" stroke="#16A085" stroke-width="1"/>
  <text x="452" y="433" text-anchor="middle" font-size="10" fill="#0b4f43">capability-idp</text>
  <line x1="488" y1="430" x2="502" y2="430" stroke="#555555" stroke-width="1.2" marker-end="url(#as)"/>
  <rect x="502" y="415" width="60" height="30" rx="4" fill="#E8F0FB" stroke="#4A90D9" stroke-width="1"/>
  <text x="532" y="433" text-anchor="middle" font-size="10" fill="#1a3a6b">gateway</text>

  <!-- ── New services badge ── -->
  <rect x="14" y="468" width="790" height="72" rx="6" fill="#f9f9f9" stroke="#dddddd" stroke-width="1"/>
  <text x="24" y="486" font-size="11" font-weight="600" fill="#333333">New in P2</text>
  <text x="24" y="502" font-size="10" fill="#555555">● MinIO: S3-compatible object store; documents uploaded as s3://bucket/key and referenced in payloads as object_ref</text>
  <text x="24" y="518" font-size="10" fill="#555555">● OCR (Tesseract): runs entirely in-container, zero egress, no LiteLLM call — provenance.backend_used = "tesseract-ocr"</text>
  <text x="24" y="534" font-size="10" fill="#555555">● IDP: orchestrates OCR → LiteLLM classify → LiteLLM extract_fields → local rule-engine validate, proving SC2 composability</text>
</svg>
