<svg viewBox="0 0 820 560" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui,sans-serif" font-size="13">
  <title>P3 Vision + Anomaly Capability — Service Architecture</title>
  <desc>Seven services: gateway, capability-vision (remote multimodal), capability-anomaly (local IsolationForest), LiteLLM broker, stub-backend, MinIO; with startup chain.</desc>

  <rect width="820" height="560" fill="#ffffff"/>
  <text x="410" y="26" text-anchor="middle" font-size="15" font-weight="600" fill="#111111">P3 Vision + Anomaly Capability — Service Architecture</text>

  <defs>
    <marker id="ab" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#4A90D9"/></marker>
    <marker id="av" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#7B5EA7"/></marker>
    <marker id="aa" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#1A6B35"/></marker>
    <marker id="al" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#E8952A"/></marker>
    <marker id="ap" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#8B5CF6"/></marker>
    <marker id="am" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#B8860B"/></marker>
    <marker id="as" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#555555"/></marker>
  </defs>

  <!-- ── Client ── -->
  <rect x="14" y="210" width="90" height="60" rx="8" fill="#f5f5f5" stroke="#cccccc" stroke-width="1.5"/>
  <text x="59" y="233" text-anchor="middle" font-weight="600" fill="#111111">Client</text>
  <text x="59" y="250" text-anchor="middle" font-size="11" fill="#666666">curl / pytest</text>
  <text x="59" y="265" text-anchor="middle" font-size="10" fill="#888888">submit · poll</text>

  <!-- ── Gateway ── -->
  <rect x="150" y="118" width="132" height="200" rx="8" fill="#E8F0FB" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="216" y="139" text-anchor="middle" font-weight="600" fill="#1a3a6b">Gateway</text>
  <text x="216" y="156" text-anchor="middle" font-size="11" fill="#1a3a6b">:8000</text>
  <rect x="168" y="174" width="96" height="48" rx="5" fill="#ffffff" stroke="#4A90D9" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="216" y="194" text-anchor="middle" font-size="11" fill="#1a3a6b" font-weight="500">Job Store</text>
  <text x="216" y="209" text-anchor="middle" font-size="10" fill="#4A90D9">in-memory</text>
  <text x="216" y="298" text-anchor="middle" font-size="10" fill="#1a3a6b">Envelope · Routing · Jobs</text>

  <!-- ── capability-vision ── (NEW) -->
  <rect x="340" y="118" width="138" height="100" rx="8" fill="#F0EBF9" stroke="#7B5EA7" stroke-width="2"/>
  <text x="409" y="139" text-anchor="middle" font-weight="600" fill="#3d2077">Vision</text>
  <text x="409" y="156" text-anchor="middle" font-size="11" fill="#3d2077">:8006  ★ new</text>
  <text x="409" y="173" text-anchor="middle" font-size="10" fill="#3d2077">describe | detect | ask</text>
  <text x="409" y="189" text-anchor="middle" font-size="10" fill="#3d2077">base64-encodes images</text>
  <text x="409" y="205" text-anchor="middle" font-size="10" fill="#7B5EA7">deepseek-v4-flash vision</text>

  <!-- ── capability-anomaly ── (NEW) -->
  <rect x="340" y="252" width="138" height="100" rx="8" fill="#E6F4EA" stroke="#1A6B35" stroke-width="2"/>
  <text x="409" y="273" text-anchor="middle" font-weight="600" fill="#0a3318">Anomaly</text>
  <text x="409" y="290" text-anchor="middle" font-size="11" fill="#0a3318">:8007  ★ new</text>
  <text x="409" y="307" text-anchor="middle" font-size="10" fill="#0a3318">fit | score | stream_score</text>
  <text x="409" y="323" text-anchor="middle" font-size="10" fill="#0a3318">IsolationForest in-memory</text>
  <text x="409" y="339" text-anchor="middle" font-size="10" fill="#1A6B35">fully local · zero egress</text>

  <!-- ── LiteLLM ── -->
  <rect x="536" y="118" width="118" height="100" rx="8" fill="#FEF4E4" stroke="#E8952A" stroke-width="1.5"/>
  <text x="595" y="140" text-anchor="middle" font-weight="600" fill="#7a4400">LiteLLM</text>
  <text x="595" y="157" text-anchor="middle" font-size="11" fill="#7a4400">:4000</text>
  <text x="595" y="178" text-anchor="middle" font-size="10" fill="#7a4400">deepseek-v4-flash</text>
  <text x="595" y="194" text-anchor="middle" font-size="10" fill="#7a4400">(vision / multimodal)</text>
  <text x="595" y="210" text-anchor="middle" font-size="10" fill="#E8952A">routes vision describe</text>
  <text x="595" y="224" text-anchor="middle" font-size="10" fill="#E8952A">detect + ask calls</text>

  <!-- ── stub-backend ── -->
  <rect x="702" y="118" width="108" height="100" rx="8" fill="#F5F0FB" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="756" y="140" text-anchor="middle" font-weight="600" fill="#3b1a7a">stub-backend</text>
  <text x="756" y="157" text-anchor="middle" font-size="11" fill="#3b1a7a">:8002</text>
  <text x="756" y="178" text-anchor="middle" font-size="10" fill="#3b1a7a">vision describe →</text>
  <text x="756" y="192" text-anchor="middle" font-size="10" fill="#3b1a7a">canned description</text>
  <text x="756" y="206" text-anchor="middle" font-size="10" fill="#3b1a7a">detect → all labels</text>
  <text x="756" y="220" text-anchor="middle" font-size="10" fill="#8B5CF6">present=true, conf=0.9</text>

  <!-- ── MinIO ── -->
  <rect x="536" y="252" width="118" height="70" rx="8" fill="#FBF3DE" stroke="#B8860B" stroke-width="1.5"/>
  <text x="595" y="273" text-anchor="middle" font-weight="600" fill="#6b4f00">MinIO</text>
  <text x="595" y="290" text-anchor="middle" font-size="11" fill="#6b4f00">:9000</text>
  <text x="595" y="308" text-anchor="middle" font-size="10" fill="#B8860B">image source for vision</text>

  <!-- ── Arrows ── -->
  <!-- Client → Gateway -->
  <line x1="104" y1="240" x2="150" y2="240" stroke="#4A90D9" stroke-width="1.6" marker-end="url(#ab)"/>
  <text x="127" y="234" text-anchor="middle" font-size="10" fill="#4A90D9">POST</text>

  <!-- Gateway → Vision -->
  <line x1="282" y1="158" x2="340" y2="158" stroke="#7B5EA7" stroke-width="1.6" marker-end="url(#av)"/>
  <text x="311" y="152" text-anchor="middle" font-size="10" fill="#7B5EA7">POST /execute</text>

  <!-- Gateway → Anomaly -->
  <line x1="282" y1="295" x2="340" y2="295" stroke="#1A6B35" stroke-width="1.6" marker-end="url(#aa)"/>
  <text x="311" y="289" text-anchor="middle" font-size="10" fill="#1A6B35">POST /execute</text>

  <!-- Vision → LiteLLM (multimodal) -->
  <line x1="478" y1="155" x2="536" y2="155" stroke="#E8952A" stroke-width="1.6" marker-end="url(#al)"/>
  <text x="507" y="148" text-anchor="middle" font-size="10" fill="#E8952A">chat+image</text>

  <!-- LiteLLM → stub-backend -->
  <line x1="654" y1="172" x2="702" y2="172" stroke="#8B5CF6" stroke-width="1.6" marker-end="url(#ap)"/>
  <text x="678" y="166" text-anchor="middle" font-size="10" fill="#8B5CF6">routes to</text>

  <!-- Vision → MinIO -->
  <line x1="478" y1="185" x2="536" y2="270" stroke="#B8860B" stroke-width="1.4" stroke-dasharray="5 2" marker-end="url(#am)"/>
  <text x="515" y="232" text-anchor="middle" font-size="10" fill="#B8860B">GetObject</text>

  <!-- Anomaly local note -->
  <rect x="530" y="365" width="180" height="30" rx="4" fill="#E6F4EA" stroke="#1A6B35" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="620" y="383" text-anchor="middle" font-size="10" fill="#0a3318">Anomaly: no external calls</text>
  <line x1="478" y1="320" x2="530" y2="375" stroke="#1A6B35" stroke-width="1" stroke-dasharray="4 2"/>

  <!-- ── Startup dependency chain ── -->
  <text x="14" y="408" font-size="11" font-weight="600" fill="#555555">Startup dependency chain</text>

  <rect x="14"  y="420" width="88" height="28" rx="4" fill="#F5F0FB" stroke="#8B5CF6" stroke-width="1"/>
  <text x="58"  y="437" text-anchor="middle" font-size="10" fill="#3b1a7a">stub-backend</text>
  <line x1="102" y1="434" x2="116" y2="434" stroke="#555555" stroke-width="1.2" marker-end="url(#as)"/>
  <rect x="116" y="420" width="60" height="28" rx="4" fill="#FEF4E4" stroke="#E8952A" stroke-width="1"/>
  <text x="146" y="437" text-anchor="middle" font-size="10" fill="#7a4400">litellm</text>
  <line x1="176" y1="434" x2="190" y2="434" stroke="#555555" stroke-width="1.2" marker-end="url(#as)"/>
  <rect x="190" y="420" width="54" height="28" rx="4" fill="#FBF3DE" stroke="#B8860B" stroke-width="1"/>
  <text x="217" y="437" text-anchor="middle" font-size="10" fill="#6b4f00">minio</text>
  <text x="254" y="437" font-size="10" fill="#888888">  →</text>
  <rect x="264" y="420" width="72" height="28" rx="4" fill="#F0EBF9" stroke="#7B5EA7" stroke-width="1"/>
  <text x="300" y="437" text-anchor="middle" font-size="10" fill="#3d2077">capability-vision</text>
  <line x1="336" y1="434" x2="350" y2="434" stroke="#555555" stroke-width="1.2" marker-end="url(#as)"/>
  <rect x="350" y="420" width="80" height="28" rx="4" fill="#E6F4EA" stroke="#1A6B35" stroke-width="1"/>
  <text x="390" y="437" text-anchor="middle" font-size="10" fill="#0a3318">capability-anomaly</text>
  <line x1="430" y1="434" x2="444" y2="434" stroke="#555555" stroke-width="1.2" marker-end="url(#as)"/>
  <rect x="444" y="420" width="60" height="28" rx="4" fill="#E8F0FB" stroke="#4A90D9" stroke-width="1"/>
  <text x="474" y="437" text-anchor="middle" font-size="10" fill="#1a3a6b">gateway</text>

  <!-- ── Notes panel ── -->
  <rect x="14" y="468" width="790" height="78" rx="6" fill="#f9f9f9" stroke="#dddddd" stroke-width="1"/>
  <text x="24" y="486" font-size="11" font-weight="600" fill="#333333">New in P3</text>
  <text x="24" y="502" font-size="10" fill="#555555">● Vision (capability-vision): all three ops route through LiteLLM as multimodal messages (base64 image_url + text). MinIO supplies the raw bytes.</text>
  <text x="24" y="518" font-size="10" fill="#555555">● Anomaly (capability-anomaly): fully local scikit-learn IsolationForest — no LiteLLM, no MinIO, no egress. IsolationForest models are KB-sized;</text>
  <text x="24" y="534" font-size="10" fill="#555555">  they are NOT "hot local models" under the one-model rule (which targets LLMs ≥ 500 MB). Models live in-memory, keyed by model_id; restart = retrain.</text>
</svg>
