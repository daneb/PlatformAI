<svg viewBox="0 0 860 580" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui,sans-serif" font-size="12">
  <title>AI Platform — Architecture Overview</title>
  <desc>Hub-and-spoke architecture showing consumers, control plane, capability spokes, inference broker, and shared substrate layers.</desc>

  <rect width="860" height="580" fill="#ffffff"/>

  <!-- CONSUMERS -->
  <rect x="20" y="20" width="820" height="66" rx="8" fill="#f7f7f7" stroke="#dddddd" stroke-width="1.2"/>
  <text x="40" y="42" font-size="10" font-weight="600" fill="#888888" letter-spacing="1">CONSUMERS</text>
  <rect x="240" y="48" width="130" height="28" rx="6" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
  <text x="305" y="67" text-anchor="middle" font-size="12" fill="#111111">Team App A</text>
  <rect x="490" y="48" width="130" height="28" rx="6" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
  <text x="555" y="67" text-anchor="middle" font-size="12" fill="#111111">Team App B</text>

  <!-- CONTROL PLANE -->
  <rect x="20" y="110" width="820" height="86" rx="8" fill="#EBF2FC" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="40" y="130" font-size="10" font-weight="600" fill="#1a3a6b" letter-spacing="1">CONTROL PLANE  ·  HUB</text>
  <rect x="35"  y="138" width="120" height="46" rx="5" fill="#ffffff" stroke="#4A90D9" stroke-width="1"/>
  <text x="95"  y="158" text-anchor="middle" font-weight="600" font-size="11" fill="#1a3a6b">Gateway</text>
  <text x="95"  y="173" text-anchor="middle" font-size="10" fill="#4A90D9">routing · jobs</text>

  <rect x="170" y="138" width="120" height="46" rx="5" fill="#ffffff" stroke="#4A90D9" stroke-width="1"/>
  <text x="230" y="158" text-anchor="middle" font-weight="600" font-size="11" fill="#1a3a6b">Identity &amp; AuthZ</text>
  <text x="230" y="173" text-anchor="middle" font-size="10" fill="#4A90D9">Keycloak · OIDC</text>

  <rect x="305" y="138" width="130" height="46" rx="5" fill="#FFF0E6" stroke="#E8952A" stroke-width="1.2"/>
  <text x="370" y="158" text-anchor="middle" font-weight="600" font-size="11" fill="#7a4400">Encoded Gates</text>
  <text x="370" y="173" text-anchor="middle" font-size="10" fill="#E8952A">Presidio · OPA/Rego</text>

  <rect x="450" y="138" width="130" height="46" rx="5" fill="#ffffff" stroke="#4A90D9" stroke-width="1"/>
  <text x="515" y="158" text-anchor="middle" font-weight="600" font-size="11" fill="#1a3a6b">Registry</text>
  <text x="515" y="173" text-anchor="middle" font-size="10" fill="#4A90D9">capability · model</text>

  <rect x="595" y="138" width="230" height="46" rx="5" fill="#ffffff" stroke="#4A90D9" stroke-width="1"/>
  <text x="710" y="158" text-anchor="middle" font-weight="600" font-size="11" fill="#1a3a6b">Observability &amp; Cost Metering</text>
  <text x="710" y="173" text-anchor="middle" font-size="10" fill="#4A90D9">OpenTelemetry · Grafana · Loki · Prometheus</text>

  <!-- SPOKES -->
  <rect x="20" y="222" width="820" height="86" rx="8" fill="#EEF7EE" stroke="#5BA85B" stroke-width="1.5"/>
  <text x="40" y="242" font-size="10" font-weight="600" fill="#1a4d1a" letter-spacing="1">CAPABILITY SERVICES  ·  SPOKES</text>
  <rect x="35"  y="250" width="140" height="46" rx="5" fill="#ffffff" stroke="#5BA85B" stroke-width="1"/>
  <text x="105" y="270" text-anchor="middle" font-weight="600" font-size="11" fill="#1a4d1a">RAG</text>
  <text x="105" y="285" text-anchor="middle" font-size="10" fill="#5BA85B">pgvector · nomic-embed</text>

  <rect x="188" y="250" width="140" height="46" rx="5" fill="#ffffff" stroke="#5BA85B" stroke-width="1"/>
  <text x="258" y="270" text-anchor="middle" font-weight="600" font-size="11" fill="#1a4d1a">OCR</text>
  <text x="258" y="285" text-anchor="middle" font-size="10" fill="#5BA85B">Tesseract · PaddleOCR</text>

  <rect x="341" y="250" width="140" height="46" rx="5" fill="#ffffff" stroke="#5BA85B" stroke-width="1"/>
  <text x="411" y="270" text-anchor="middle" font-weight="600" font-size="11" fill="#1a4d1a">IDP Pipeline</text>
  <text x="411" y="285" text-anchor="middle" font-size="10" fill="#5BA85B">OCR → extract → validate</text>

  <rect x="494" y="250" width="140" height="46" rx="5" fill="#ffffff" stroke="#5BA85B" stroke-width="1"/>
  <text x="564" y="270" text-anchor="middle" font-weight="600" font-size="11" fill="#1a4d1a">Vision</text>
  <text x="564" y="285" text-anchor="middle" font-size="10" fill="#5BA85B">CLIP/YOLO · DeepSeek vision</text>

  <rect x="647" y="250" width="178" height="46" rx="5" fill="#ffffff" stroke="#5BA85B" stroke-width="1"/>
  <text x="736" y="270" text-anchor="middle" font-weight="600" font-size="11" fill="#1a4d1a">Anomaly Detection</text>
  <text x="736" y="285" text-anchor="middle" font-size="10" fill="#5BA85B">PyOD · river · scikit-learn</text>

  <!-- BROKER -->
  <rect x="20" y="334" width="820" height="80" rx="8" fill="#FEF4E4" stroke="#E8952A" stroke-width="1.5"/>
  <text x="40" y="354" font-size="10" font-weight="600" fill="#7a4400" letter-spacing="1">INFERENCE BROKER  ·  LiteLLM  :4000</text>
  <rect x="35"  y="362" width="380" height="40" rx="5" fill="#ffffff" stroke="#5BA85B" stroke-width="1"/>
  <text x="225" y="378" text-anchor="middle" font-weight="600" font-size="11" fill="#1a4d1a">Local  (free · private)</text>
  <text x="225" y="394" text-anchor="middle" font-size="10" fill="#5BA85B">embeddings (nomic-embed)  ·  OCR (Tesseract)  ·  anomaly (PyOD)</text>
  <rect x="430" y="362" width="395" height="40" rx="5" fill="#ffffff" stroke="#E8952A" stroke-width="1.2"/>
  <text x="627" y="378" text-anchor="middle" font-weight="600" font-size="11" fill="#7a4400">Remote  (capable · metered)</text>
  <text x="627" y="394" text-anchor="middle" font-size="10" fill="#E8952A">deepseek-v4-flash  (workhorse)  ·  deepseek-v4-pro  (hard reasoning)</text>

  <!-- SUBSTRATE -->
  <rect x="20" y="440" width="820" height="80" rx="8" fill="#f7f7f7" stroke="#cccccc" stroke-width="1.2"/>
  <text x="40" y="460" font-size="10" font-weight="600" fill="#888888" letter-spacing="1">SHARED SUBSTRATE</text>
  <rect x="35"  y="468" width="170" height="40" rx="5" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
  <text x="120" y="484" text-anchor="middle" font-size="11" font-weight="600" fill="#111111">Object Store</text>
  <text x="120" y="500" text-anchor="middle" font-size="10" fill="#666666">MinIO  (S3 API)</text>

  <rect x="220" y="468" width="170" height="40" rx="5" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
  <text x="305" y="484" text-anchor="middle" font-size="11" font-weight="600" fill="#111111">Vector Store</text>
  <text x="305" y="500" text-anchor="middle" font-size="10" fill="#666666">Postgres + pgvector</text>

  <rect x="405" y="468" width="170" height="40" rx="5" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
  <text x="490" y="484" text-anchor="middle" font-size="11" font-weight="600" fill="#111111">Queue / Events</text>
  <text x="490" y="500" text-anchor="middle" font-size="10" fill="#666666">SQS · SNS  (LocalStack)</text>

  <rect x="590" y="468" width="170" height="40" rx="5" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
  <text x="675" y="484" text-anchor="middle" font-size="11" font-weight="600" fill="#111111">Secrets</text>
  <text x="675" y="500" text-anchor="middle" font-size="10" fill="#666666">SOPS + age</text>

  <!-- VERTICAL ARROWS -->
  <defs>
    <marker id="a-blue"   markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#4A90D9"/></marker>
    <marker id="a-green"  markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#5BA85B"/></marker>
    <marker id="a-orange" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#E8952A"/></marker>
    <marker id="a-gray"   markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#bbbbbb"/></marker>
  </defs>
  <line x1="430" y1="86"  x2="430" y2="108" stroke="#4A90D9" stroke-width="2" marker-end="url(#a-blue)"/>
  <text x="436" y="101" font-size="9" fill="#4A90D9">all traffic</text>
  <line x1="430" y1="196" x2="430" y2="220" stroke="#5BA85B" stroke-width="2" marker-end="url(#a-green)"/>
  <text x="436" y="215" font-size="9" fill="#5BA85B">gate-checked</text>
  <line x1="430" y1="308" x2="430" y2="332" stroke="#E8952A" stroke-width="2" marker-end="url(#a-orange)"/>
  <text x="436" y="327" font-size="9" fill="#E8952A">policy-routed</text>
  <line x1="620" y1="308" x2="620" y2="438" stroke="#bbbbbb" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#a-gray)"/>
  <text x="626" y="375" font-size="9" fill="#aaaaaa">reads / writes</text>

  <!-- Phase badge -->
  <rect x="20" y="535" width="820" height="32" rx="6" fill="#EEF7EE" stroke="#5BA85B" stroke-width="1"/>
  <text x="40"  y="556" font-size="11" fill="#1a4d1a" font-weight="600">Current phase: </text>
  <text x="132" y="556" font-size="11" fill="#5BA85B">P0 complete ✓</text>
  <text x="220" y="556" font-size="11" fill="#444444">  ·  Next: P1 RAG — pgvector + embeddings + remote generation + eval harness</text>
</svg>
