<svg viewBox="0 0 820 520" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui,sans-serif" font-size="13">
  <title>P0 Walking Skeleton — Component Architecture</title>
  <desc>Four docker-compose services: stub-backend, LiteLLM broker, capability-summarize spoke, and gateway, with request/response arrows and the startup dependency chain.</desc>

  <rect width="820" height="520" fill="#ffffff"/>
  <text x="410" y="30" text-anchor="middle" font-size="15" font-weight="600" fill="#111111">P0 Walking Skeleton — Component Architecture</text>

  <defs>
    <marker id="ab" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#4A90D9"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#5BA85B"/></marker>
    <marker id="ax" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#888888"/></marker>
  </defs>

  <!-- Client -->
  <rect x="20" y="200" width="120" height="60" rx="8" fill="#f5f5f5" stroke="#cccccc" stroke-width="1.5"/>
  <text x="80" y="226" text-anchor="middle" font-weight="600" fill="#111111">Client</text>
  <text x="80" y="244" text-anchor="middle" font-size="11" fill="#666666">curl / pytest</text>

  <!-- Gateway -->
  <rect x="185" y="150" width="150" height="160" rx="8" fill="#E8F0FB" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="260" y="172" text-anchor="middle" font-weight="600" fill="#1a3a6b">Gateway</text>
  <text x="260" y="190" text-anchor="middle" font-size="11" fill="#1a3a6b">:8000</text>
  <rect x="205" y="205" width="110" height="46" rx="5" fill="#ffffff" stroke="#4A90D9" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="260" y="222" text-anchor="middle" font-size="11" fill="#1a3a6b" font-weight="500">Job Store</text>
  <text x="260" y="238" text-anchor="middle" font-size="10" fill="#4A90D9">in-memory</text>
  <text x="260" y="285" text-anchor="middle" font-size="10" fill="#1a3a6b">Envelope · Routing · Jobs</text>

  <!-- Summarize spoke -->
  <rect x="385" y="150" width="150" height="90" rx="8" fill="#EEF7EE" stroke="#5BA85B" stroke-width="1.5"/>
  <text x="460" y="172" text-anchor="middle" font-weight="600" fill="#1a4d1a">Summarize</text>
  <text x="460" y="190" text-anchor="middle" font-size="11" fill="#1a4d1a">:8001</text>
  <text x="460" y="215" text-anchor="middle" font-size="10" fill="#1a4d1a">spoke · FastAPI</text>
  <text x="460" y="229" text-anchor="middle" font-size="10" fill="#1a4d1a">builds provenance + gates</text>

  <!-- LiteLLM -->
  <rect x="385" y="290" width="150" height="80" rx="8" fill="#FEF4E4" stroke="#E8952A" stroke-width="1.5"/>
  <text x="460" y="313" text-anchor="middle" font-weight="600" fill="#7a4400">LiteLLM</text>
  <text x="460" y="331" text-anchor="middle" font-size="11" fill="#7a4400">:4000</text>
  <text x="460" y="353" text-anchor="middle" font-size="10" fill="#7a4400">broker · OpenAI-compat</text>

  <!-- Stub backend -->
  <rect x="590" y="220" width="150" height="100" rx="8" fill="#F5F0FB" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="665" y="244" text-anchor="middle" font-weight="600" fill="#3b1a7a">stub-backend</text>
  <text x="665" y="262" text-anchor="middle" font-size="11" fill="#3b1a7a">:8002</text>
  <rect x="610" y="275" width="110" height="30" rx="4" fill="#ffffff" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="665" y="295" text-anchor="middle" font-size="10" fill="#8B5CF6">fixtures/stub-model.json</text>

  <!-- Arrows: Client → Gateway POST /capabilities -->
  <line x1="140" y1="222" x2="183" y2="222" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="161" y="213" text-anchor="middle" font-size="10" fill="#4A90D9">POST</text>
  <text x="161" y="226" text-anchor="middle" font-size="10" fill="#4A90D9">/capabilities</text>

  <!-- Gateway → Client: 202 -->
  <line x1="183" y1="240" x2="140" y2="240" stroke="#888888" stroke-width="1.5" marker-end="url(#ax)"/>
  <text x="161" y="256" text-anchor="middle" font-size="10" fill="#888888">202 job_id</text>

  <!-- Client → Gateway: GET /jobs -->
  <path d="M80,260 Q80,340 183,340" stroke="#4A90D9" stroke-width="1.5" fill="none" stroke-dasharray="5 3" marker-end="url(#ab)"/>
  <text x="108" y="320" text-anchor="middle" font-size="10" fill="#4A90D9">GET /jobs/{id}</text>

  <!-- Gateway → Summarize: POST /execute -->
  <line x1="335" y1="195" x2="383" y2="195" stroke="#5BA85B" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="359" y="187" text-anchor="middle" font-size="10" fill="#5BA85B">POST</text>
  <text x="359" y="200" text-anchor="middle" font-size="10" fill="#5BA85B">/execute</text>

  <!-- Summarize → Gateway: result -->
  <line x1="383" y1="213" x2="335" y2="213" stroke="#888888" stroke-width="1.5" marker-end="url(#ax)"/>
  <text x="359" y="228" text-anchor="middle" font-size="9" fill="#777777">result · provenance · gates</text>

  <!-- Summarize → LiteLLM -->
  <line x1="460" y1="240" x2="460" y2="288" stroke="#E8952A" stroke-width="1.5" marker-end="url(#ax)"/>
  <text x="476" y="268" font-size="10" fill="#E8952A">chat/completions</text>

  <!-- LiteLLM → Stub -->
  <line x1="535" y1="330" x2="588" y2="295" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#ax)"/>
  <text x="563" y="320" text-anchor="middle" font-size="10" fill="#8B5CF6">routes to</text>
  <text x="563" y="333" text-anchor="middle" font-size="10" fill="#8B5CF6">stub-model</text>

  <!-- Stub → LiteLLM: fixture -->
  <line x1="590" y1="315" x2="537" y2="345" stroke="#888888" stroke-width="1.5" marker-end="url(#ax)"/>
  <text x="555" y="358" text-anchor="middle" font-size="9" fill="#777777">canned completion</text>

  <!-- Startup chain -->
  <rect x="20" y="390" width="780" height="110" rx="8" fill="#f7f7f7" stroke="#dddddd" stroke-width="1"/>
  <text x="40" y="412" font-weight="600" font-size="12" fill="#111111">Startup dependency chain (docker-compose healthchecks)</text>

  <rect x="40"  y="425" width="120" height="30" rx="5" fill="#F5F0FB" stroke="#8B5CF6" stroke-width="1.2"/>
  <text x="100" y="445" text-anchor="middle" font-size="11" fill="#3b1a7a">stub-backend</text>
  <text x="170" y="445" text-anchor="middle" font-size="14" fill="#aaaaaa">→</text>
  <rect x="185" y="425" width="110" height="30" rx="5" fill="#FEF4E4" stroke="#E8952A" stroke-width="1.2"/>
  <text x="240" y="445" text-anchor="middle" font-size="11" fill="#7a4400">litellm</text>
  <text x="305" y="445" text-anchor="middle" font-size="14" fill="#aaaaaa">→</text>
  <rect x="320" y="425" width="140" height="30" rx="5" fill="#EEF7EE" stroke="#5BA85B" stroke-width="1.2"/>
  <text x="390" y="445" text-anchor="middle" font-size="11" fill="#1a4d1a">capability-summarize</text>
  <text x="470" y="445" text-anchor="middle" font-size="14" fill="#aaaaaa">→</text>
  <rect x="485" y="425" width="110" height="30" rx="5" fill="#E8F0FB" stroke="#4A90D9" stroke-width="1.2"/>
  <text x="540" y="445" text-anchor="middle" font-size="11" fill="#1a3a6b">gateway</text>

  <text x="40"  y="482" font-size="11" fill="#555555">Verify: </text>
  <text x="82"  y="482" font-size="11" fill="#555555" font-family="monospace">docker compose ps</text>
  <text x="215" y="482" font-size="11" fill="#555555"> — all four containers must show </text>
  <text x="432" y="482" font-size="11" fill="#5BA85B" font-weight="600">(healthy)</text>
  <text x="482" y="482" font-size="11" fill="#555555"> before running tests</text>
</svg>
